<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>This website is VANILLA 🍦</h1>
    </header>

    <main>
      <section class="hero">
        <p>Vanilla flavored — HTML, CSS, and JavaScript, straight from the browser.</p>
      </section>

      <section class="row">
        <vanilla-counter min="-100" alert-at="-10">
          <span slot="heading">Look ma, no React ☢️</span>
        </vanilla-counter>
      </section>

      <section class="row">
        <vanilla-carousel>
          <span slot="heading">Swiper be Gone!</span>
          <img src="https://picsum.photos/id/10/800/450" alt="Landscape 1" />
          <img src="https://picsum.photos/id/29/800/450" alt="Landscape 2" />
          <img src="https://picsum.photos/id/42/800/450" alt="Landscape 3" />
        </vanilla-carousel>
      </section>

      <section class="row">
        <vanilla-sparkles count="40">
          <span slot="heading">It's Magic</span>
        </vanilla-sparkles>
      </section>
    </main>

    <footer>
      <small>&copy; 2026</small>
    </footer>
    <script type="module" src="/main.js"></script>
  </body>
</html>
