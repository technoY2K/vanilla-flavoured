<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>This website is VANILLA 🍦</h1>
    </header>

    <main>
      <p>Vanilla flavored — HTML, CSS, and JavaScript, straight from the browser.</p>

      <section class="counter">
        <h2>Look ma, no React ☢️</h2>
        <button class="counter-btn" data-action="decrement">−</button>
        <span class="counter-value">0</span>
        <button class="counter-btn" data-action="increment">+</button>
      </section>

      <vanilla-carousel>
        <span slot="heading">Swiper be Gone!</span>
        <img src="https://picsum.photos/id/10/800/450" alt="Landscape 1" />
        <img src="https://picsum.photos/id/29/800/450" alt="Landscape 2" />
        <img src="https://picsum.photos/id/42/800/450" alt="Landscape 3" />
      </vanilla-carousel>
    </main>

    <footer>
      <small>&copy; 2026</small>
    </footer>

    <dialog class="alert">
      <p>Uh oh, we need a framework</p>
      <button class="alert-close">Just kidding</button>
    </dialog>

    <script type="module" src="/main.js"></script>
  </body>
</html>
